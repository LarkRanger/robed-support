<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Policy — Robed</title>
    <link rel="icon" type="image/png" href="icons/icon.png">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary: #e11d48;
            --bg: #f5f5f7;
            --container-bg: #ffffff;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --border: #e5e7eb;
            --bg-dark: #0c0a0b;
            --nav-text: #9ca3af;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0c0a0b;
                --container-bg: #1a1a1c;
                --text-primary: #f9fafb;
                --text-secondary: #9ca3af;
                --border: #2d2d2f;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            line-height: 1.7;
            min-height: 100vh;
        }

        nav {
            background: rgba(12, 10, 11, 0.88);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(255,255,255,0.07);
            padding: 0 2rem;
            height: 56px;
            display: flex;
            align-items: center;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: #fff;
        }

        .nav-logo img { width: 26px; height: 26px; border-radius: 6px; }
        .nav-logo span { font-size: 1.0625rem; font-weight: 700; letter-spacing: -0.02em; }

        .page-wrap {
            padding: 2.5rem 1.5rem 4rem;
            max-width: 760px;
            margin: 0 auto;
        }

        .back {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.875rem;
            margin-bottom: 2rem;
            transition: color 0.15s;
        }

        .back:hover { color: var(--primary); }

        .content-card {
            background: var(--container-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        #content h1 { font-size: 1.875rem; font-weight: 800; margin-bottom: 0.5rem; letter-spacing: -0.02em; }
        #content h2 { font-size: 1.1875rem; font-weight: 700; margin-top: 2rem; margin-bottom: 0.625rem; }
        #content h3 { font-size: 1rem; font-weight: 600; margin-top: 1.5rem; margin-bottom: 0.5rem; }
        #content p { color: var(--text-secondary); margin-bottom: 1rem; }
        #content ul, #content ol { color: var(--text-secondary); margin: 0 0 1rem 1.5rem; }
        #content li { margin-bottom: 0.375rem; }
        #content strong { color: var(--text-primary); }
        #content a { color: var(--primary); text-underline-offset: 3px; }
        #content hr { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }

        @media (max-width: 600px) {
            .content-card { padding: 1.5rem; border-radius: 12px; }
        }
    </style>
</head>
<body>
    <nav>
        <a class="nav-logo" href="index.html">
            <img src="icons/relaxed_512.png" alt="Robed" />
            <span>robed</span>
        </a>
    </nav>
    <div class="page-wrap">
        <a class="back" href="index.html">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
            Back to home
        </a>
        <div class="content-card">
            <div id="content">Loading…</div>
        </div>
    </div>
    <script>
        fetch('PRIVACY.md')
            .then(r => r.text())
            .then(text => { document.getElementById('content').innerHTML = marked.parse(text); })
            .catch(() => { document.getElementById('content').textContent = 'Failed to load content.'; });
    </script>
</body>
</html>
